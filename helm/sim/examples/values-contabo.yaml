# Global configuration
global:
  imageRegistry: "ghcr.io"
  storageClass: "local-path"

# Main application
app:
  enabled: true
  replicaCount: 1

  resources:
    limits:
      memory: "4Gi"
    requests:
      memory: "2Gi"
      cpu: "500m"

  env:
    # --- DOMAIN CONFIGURATION ---
    NEXT_PUBLIC_APP_URL: "https://sim.testing-ai.online"
    BETTER_AUTH_URL: "https://sim.testing-ai.online"
    NEXT_PUBLIC_SOCKET_URL: "https://real-time-sim.testing-ai.online"

    # --- SECURITY SECRETS ---
    # Generated using: openssl rand -hex 32
    BETTER_AUTH_SECRET: "ef3a0182e91a0ac58fc8ef71477efe45bc84d6b7e7f69eb5ab658664ad0a8bbc"
    ENCRYPTION_KEY: "7b07d9c1d8441022b2ba7faf522e90db5fc0a67eb0eefe25cda63f0a75119db0"
    INTERNAL_API_SECRET: "05b567ef046550c56694755d0321cb5354c099b82beabc6ec7324e67667170bd"
    CRON_SECRET: "19f0be17bb28dcec7cd8935d177189d1bfcc47e52db4e6fa5479b7ec1b084745"
    API_ENCRYPTION_KEY: "681f51ce16cbc1633f13657cb7bc17b32c533a018df72573ec207124a8c3d6e8"

    NODE_ENV: "production"
    NEXT_TELEMETRY_DISABLED: "1"

    # --- STORAGE CONFIGURATION (MINIO / S3) ---
    STORAGE_DRIVER: "s3"

    # Internal DNS for S3 uploads (Server-to-Server)
    S3_ENDPOINT: "http://trigger-minio.trigger.svc.cluster.local:9000"

    # Public URL for S3 downloads (Browser-to-Server)
    # Required so your browser can see images and files via the Gateway
    S3_PUBLIC_URL: "https://minio-trigger.testing-ai.online"

    # MinIO credentials (must match triger s3 )
    S3_ACCESS_KEY: "trigger-s3-access"
    S3_SECRET_KEY: "trigger-s3-secret-key-fort"

    # Technical S3 settings
    S3_REGION: "us-east-1"      # Mandatory placeholder for local MinIO
    S3_FORCE_PATH_STYLE: "true" # Required for MinIO path mapping
    S3_USE_SSL: "false"         # False because internal cluster communication is HTTP

    # Bucket names (folders) in MinIO
    S3_BUCKET: "workspace-files"
    S3_KB_BUCKET: "knowledge-base"
    S3_EXECUTION_FILES_BUCKET: "execution-files"
    S3_CHAT_BUCKET: "chat-files"
    S3_COPILOT_BUCKET: "copilot-files"
    S3_PROFILE_PICTURES_BUCKET: "profile-pictures"
    S3_OG_IMAGES_BUCKET: "og-images"
    TRIGGER_PROJECT_ID: proj_wzaqgpotfypqhyeusdji
    TRIGGER_SECRET_KEY: tr_prod_UNw0TrPbZpHVxALwFPLO
    TRIGGER_DEV_ENABLED: true
    TRIGGER_API_URL: https://trigger.testing-ai.online

# Realtime service (WebSocket)
realtime:
  enabled: true
  replicaCount: 1

  resources:
    limits:
      memory: "2Gi"
    requests:
      memory: "1Gi"
      cpu: "250m"

  env:
    NEXT_PUBLIC_APP_URL: "https://sim.testing-ai.online"
    BETTER_AUTH_URL: "https://sim.testing-ai.online"
    NEXT_PUBLIC_SOCKET_URL: "https://sim-ws.testing-ai.online"
    # MUST MATCH THE APP BETTER_AUTH_SECRET ABOVE
    BETTER_AUTH_SECRET: "ef3a0182e91a0ac58fc8ef71477efe45bc84d6b7e7f69eb5ab658664ad0a8bbc"
    ALLOWED_ORIGINS: "https://sim.testing-ai.online"
    NODE_ENV: "production"
    TRIGGER_PROJECT_ID: proj_wzaqgpotfypqhyeusdji
    TRIGGER_SECRET_KEY: tr_prod_UNw0TrPbZpHVxALwFPLO
    TRIGGER_DEV_ENABLED: true
    TRIGGER_API_URL: https://trigger.testing-ai.online

# Database migrations
migrations:
  enabled: true

# PostgreSQL database
postgresql:
  enabled: true
  auth:
    username: postgres
    password: "changeme" 
    database: simstudio

  persistence:
    enabled: true
    storageClass: "local-path"
    size: 10Gi

# Ollama (Disabled - requires GPU nodes)
ollama:
  enabled: false

# Standard Ingress (Disabled in favor of Gateway API / HTTPRoute)
ingress:
  enabled: false

ingressInternal:
  enabled: false